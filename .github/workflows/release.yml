name: release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  check-version:
    name: tag matches Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: check
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version=$(cargo pkgid | sed 's/.*#//')
          if [ "$tag" != "$version" ]; then
            echo "tag v$tag does not match Cargo.toml version $version"
            exit 1
          fi

  ci-green:
    name: CI passed for the tagged commit
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - name: wait for the commit's CI run to succeed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for _ in $(seq 60); do
            json=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow CI --commit "$GITHUB_SHA" --json status,conclusion --limit 5)
            if echo "$json" | jq -e 'any(.[]; .status == "completed" and .conclusion == "success")' >/dev/null; then
              exit 0
            fi
            if echo "$json" | jq -e 'any(.[]; .status == "completed" and .conclusion != "success")' >/dev/null; then
              echo "CI for $GITHUB_SHA concluded with a failure"; exit 1
            fi
            echo "CI for $GITHUB_SHA still running; waiting..."
            sleep 30
          done
          echo "timed out waiting for CI"; exit 1

  publish:
    name: publish to crates.io
    needs: [check-version, ci-green]
    runs-on: ubuntu-latest
    environment: crates-io
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: cargo publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  github-release:
    name: GitHub release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: create release (CHANGELOG section as notes, generated as fallback)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Extract this tag's section from CHANGELOG.md ("## v0.0.1" until
          # the next "## " heading), dropping the heading itself.
          awk -v tag="$GITHUB_REF_NAME" '
            $0 ~ "^## " tag "([^0-9.]|$)" { found=1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > notes.md || true
          if [ -s notes.md ]; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes-file notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
